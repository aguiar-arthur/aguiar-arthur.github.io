    <a href="{{ "/annotations/categories/" | relative_url }}">Categories</a>

<ul>
  {% assign annotation_posts = site.annotations | sort: "date" | reverse %}
  {% for post in annotation_posts %}
    <li>
      <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
      <p>{{ post.date | date: "%B %d, %Y" }}</p>
    </li>
  {% endfor %}
</ul>
